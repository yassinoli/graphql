<!DOCTYPE html>
<html>
<head>
<style>
svg {
  border: 1px solid black;
}

.bar {
  fill: steelblue;
}

.label {
  font-size: 10px;
  text-anchor: middle;
}

.value {
  font-size: 9px;
  fill: black;
  text-anchor: middle;
}
</style>
</head>
<body>

<svg id="chart" width="800" height="300"></svg>

<script>
// data dyalk
const rawData = [
  'unix = 15', 'tcp = 30', 'sys-admin = 5', 'stats = 25',
  'sql = 25', 'prog = 85', 'js = 40', 'html = 35',
  'go = 52', 'game = 10', 'front-end = 45',
  'docker = 15', 'css = 15', 'back-end = 40',
  'algo = 35', 'ai = 5'
];

// parse data
const data = rawData.map(item => {
  const [name, value] = item.split('=');
  return {
    name: name.trim(),
    value: Number(value.trim())
  };
});

const svg = document.getElementById("chart");

const width = 800;
const height = 300;
const padding = 30;

const barWidth = width / data.length;

// max value
const max = Math.max(...data.map(d => d.value));

data.forEach((d, i) => {
  const barHeight = (d.value / max) * (height - padding);

  const x = i * barWidth;
  const y = height - barHeight;

  // create rect
  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("x", x + 5);
  rect.setAttribute("y", y);
  rect.setAttribute("width", barWidth - 10);
  rect.setAttribute("height", barHeight);
  rect.setAttribute("class", "bar");

  svg.appendChild(rect);

  // skill name
  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x + barWidth / 2);
  text.setAttribute("y", height - 5);
  text.setAttribute("class", "label");
  text.textContent = d.name;

  svg.appendChild(text);

  // value فوق bar
  const valueText = document.createElementNS("http://www.w3.org/2000/svg", "text");
  valueText.setAttribute("x", x + barWidth / 2);
  valueText.setAttribute("y", y - 5);
  valueText.setAttribute("class", "value");
  valueText.textContent = d.value;

  svg.appendChild(valueText);
});
</script>

</body>
</html>
